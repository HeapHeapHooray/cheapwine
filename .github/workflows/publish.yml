name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use tag/default)'
        required: false
        type: string


jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Set package version from tag or input
        run: |
          VERSION=""
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi

          if [ -n "$VERSION" ]; then
            echo "Setting package version to $VERSION"
            export VERSION
            python -c '
            import os, re
            version = os.environ.get("VERSION")
            with open("pyproject.toml", "r") as f:
                content = f.read()
            updated = re.sub(r"(?m)^version\s*=\s*\"[^\"]+\"", f"version = \"{version}\"", content)
            with open("pyproject.toml", "w") as f:
                f.write(updated)

            with open("cheapwine/__init__.py", "r") as f:
                content = f.read()
            updated = re.sub(r"__version__\s*=\s*\"[^\"]+\"", f"__version__ = \"{version}\"", content)
            with open("cheapwine/__init__.py", "w") as f:
                f.write(updated)
            '
          else
            echo "Using default version from pyproject.toml"
          fi

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Store built distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI 🐍
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cheapwine
    permissions:
      id-token: write  # Required for Trusted Publishing (OIDC)

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
